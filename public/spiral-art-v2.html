<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spiral Art</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@1&display=swap');

/* ── TOKENS ───────────────────────────────────────────────────────────────── */
:root {
  --bg:        #f5f4f0;
  --surface:   #ffffff;
  --surface2:  #efefeb;
  --border:    #e0ddd6;
  --text:      #1a1814;
  --text2:     #5a5750;
  --muted:     #9a9690;
  --accent:    #1a1814;
  --accent-fg: #ffffff;
  --green:     #2d6a4f;
  --shadow:    0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius:    16px;
  --panel-w:   300px;
  --panel-h:   220px;
  --safe-b:    env(safe-area-inset-bottom, 0px);
  --safe-t:    env(safe-area-inset-top, 0px);
}

[data-theme="dark"] {
  --bg:        #111110;
  --surface:   #1c1c1a;
  --surface2:  #262624;
  --border:    #2e2e2c;
  --text:      #f0ede8;
  --text2:     #a0998e;
  --muted:     #666460;
  --accent:    #c8f55a;
  --accent-fg: #111110;
  --shadow:    0 2px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

/* ── RESET ────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  height: 100%; height: 100dvh;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
}

body {
  background: var(--bg);
  color: var(--text);
  height: 100%; height: 100dvh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 1fr var(--panel-w);
  grid-template-areas:
    "header header"
    "canvas panel";
  height: 100dvh;
}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 10;
  gap: 1rem;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.3rem;
  color: var(--text);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.logo em { color: var(--accent); font-style: italic; }

.header-center {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  background: var(--surface2);
  border-radius: 99px;
  padding: 3px;
  flex-shrink: 0;
}

.mode-pill {
  padding: 0.3rem 0.9rem;
  border-radius: 99px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.mode-pill.active {
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 600;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-left: auto;
}

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--text); }
.icon-btn:active { transform: scale(0.92); }

.save-btn {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.4rem 1rem;
  border-radius: 99px;
  background: var(--accent);
  color: var(--accent-fg);
  border: none;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.save-btn:hover { opacity: 0.88; }
.save-btn:active { transform: scale(0.96); }

/* ── CANVAS AREA ─────────────────────────────────────────────────────────── */
.canvas-area {
  grid-area: canvas;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  overflow: hidden;
  position: relative;
  background: var(--bg);
}

.canvas-wrap {
  position: relative;
  flex-shrink: 0;
}

.canvas-ring {
  border-radius: 50%;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  transition: box-shadow 0.3s;
  position: relative;
}

#spiralCanvas {
  display: block;
  border-radius: 50%;
}

.empty-state {
  position: absolute; inset: 0;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0.75rem;
  cursor: pointer;
  background: var(--surface);
  border: 2px dashed var(--border);
  transition: all 0.2s;
}
.empty-state:hover {
  border-color: var(--accent);
  background: var(--surface2);
}
.empty-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  transition: background 0.2s;
}
.empty-label {
  font-size: 0.72rem; font-weight: 500;
  color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase;
}

.loading-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  display: none; align-items: center; justify-content: center;
  z-index: 5;
}
[data-theme="dark"] .loading-ring { background: rgba(0,0,0,0.4); }
.loading-ring.show { display: flex; }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Canvas FABs */
.canvas-fabs {
  position: absolute;
  top: 50%; right: -3rem;
  transform: translateY(-50%);
  display: none; flex-direction: column; gap: 0.5rem;
}
.canvas-fabs.show { display: flex; }
.fab {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.9rem; color: var(--text2);
  box-shadow: var(--shadow);
  transition: all 0.15s;
}
.fab:hover { border-color: var(--accent); color: var(--text); }
.fab:active { transform: scale(0.9); }

/* ── SIDE PANEL (Desktop) ─────────────────────────────────────────────────── */
.panel {
  grid-area: panel;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
}

.panel-section {
  padding: 1.1rem 1.1rem 0;
}
.panel-section:last-child { padding-bottom: 1.1rem; }

.panel-divider {
  height: 1px;
  background: var(--border);
  margin: 0.9rem 0 0;
}

.panel-label {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
}

/* Tab bar */
.tab-bar {
  display: flex;
  background: var(--surface2);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
  margin-bottom: 0.9rem;
}
.tab-item {
  flex: 1; text-align: center;
  padding: 0.38rem 0.2rem;
  border-radius: 8px;
  font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  border: none; background: transparent;
  font-family: inherit;
  white-space: nowrap;
}
.tab-item.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* Slider */
.slider-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
.slider-labels {
  display: flex; justify-content: space-between;
  font-size: 0.67rem; color: var(--muted);
}
.track {
  position: relative; height: 32px;
  display: flex; align-items: center;
  cursor: pointer; user-select: none;
}
.track-bg {
  width: 100%; height: 5px; border-radius: 99px;
  background: var(--surface2);
}
.track-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--border) 0%, var(--accent) 100%);
  transition: width 0.04s;
}
.track-thumb {
  position: absolute; top: 50%;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border);
  transform: translate(-50%, -50%);
  box-shadow: 0 1px 6px rgba(0,0,0,0.15);
  pointer-events: none;
  transition: border-color 0.15s, transform 0.1s;
}
.track:active .track-thumb {
  border-color: var(--accent);
  transform: translate(-50%, -50%) scale(1.15);
}

/* Haptic dots */
.dots {
  display: flex; justify-content: space-between;
  padding: 0 2px;
}
.dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--border);
  transition: background 0.1s;
}
.dot.on { background: var(--accent); }

/* Color palette */
.color-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0.4rem;
}
.color-swatch {
  aspect-ratio: 1;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.active {
  border-color: var(--text);
  transform: scale(1.12);
}
.color-custom {
  aspect-ratio: 1; border-radius: 50%;
  border: 2px dashed var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; color: var(--muted);
  transition: all 0.15s; overflow: hidden;
  position: relative;
}
.color-custom:hover { border-color: var(--accent); color: var(--accent); }
.color-custom input[type=color] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

/* Generate button */
.gen-btn {
  width: 100%; padding: 0.8rem;
  background: var(--accent); color: var(--accent-fg);
  border: none; border-radius: 12px;
  font-family: inherit; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; margin-top: 0.75rem;
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.gen-btn:hover { opacity: 0.88; }
.gen-btn:active { transform: scale(0.97); }

/* ── MOBILE LAYOUT ────────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  .app {
    grid-template-rows: 48px 1fr auto;
    grid-template-columns: 1fr;
    grid-template-areas:
      "header"
      "canvas"
      "panel";
  }

  .panel {
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    max-height: 54vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .panel-section { padding: 0.9rem 1rem 0; }
  .panel-section:last-child { padding-bottom: calc(1rem + var(--safe-b)); }

  .canvas-area { padding: 0.75rem; }

  .canvas-fabs {
    right: -2.5rem;
  }

  .header-center { display: none; }
  .mobile-mode-bar {
    display: flex !important;
    justify-content: center;
    gap: 0.3rem;
    padding: 0.5rem 1rem 0;
  }

  .save-btn span { display: none; }

  .color-grid { grid-template-columns: repeat(8, 1fr); }
}

/* Mobile mode bar (hidden on desktop) */
.mobile-mode-bar { display: none; }

/* ── EXPORT SHEET ─────────────────────────────────────────────────────────── */
.sheet-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end;
  justify-content: center;
}
.sheet-bg.show { display: flex; }
.sheet {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 1.25rem 1.25rem calc(1.5rem + var(--safe-b));
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 99px;
  background: var(--border); margin: 0 auto 1.2rem;
}
.sheet-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
.export-opt {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.9rem 1rem; border-radius: 12px;
  background: var(--surface2); cursor: pointer;
  transition: background 0.15s; border: none; width: 100%;
  font-family: inherit; color: var(--text); text-align: left;
  margin-bottom: 0.5rem;
}
.export-opt:hover { background: var(--border); }
.export-opt:active { opacity: 0.7; }
.export-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.export-label { font-weight: 500; font-size: 0.88rem; }
.export-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

/* ── TOAST ────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: calc(5rem + var(--safe-b)); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--text); color: var(--bg);
  padding: 0.55rem 1.1rem; border-radius: 99px;
  font-size: 0.78rem; font-weight: 500;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: all 0.25s; z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Hidden */
#fileInput, #imgCanvas { display: none; }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">Spiral <em>Art</em></div>

    <!-- Desktop mode toggle (center) -->
    <div class="header-center">
      <button class="mode-pill active" id="pillHalftone" onclick="setMode('halftone')">Revelado</button>
      <button class="mode-pill" id="pillTemplate" onclick="setMode('template')">Para Pintar</button>
    </div>

    <div class="header-actions">
      <!-- Theme toggle -->
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">☀</div>
      <!-- Save -->
      <button class="save-btn" onclick="showSheet()" id="saveBtn" style="display:none">
        <span style="font-size:1rem">↓</span>
        <span>Salvar</span>
      </button>
    </div>
  </header>

  <!-- ── CANVAS ─────────────────────────────────────────────────────────── -->
  <main class="canvas-area" id="canvasArea">
    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-ring" id="canvasRing">
        <canvas id="spiralCanvas"></canvas>

        <div class="empty-state" id="emptyState" onclick="triggerUpload()">
          <div class="empty-icon">🖼</div>
          <div class="empty-label">Adicionar foto</div>
        </div>

        <div class="loading-ring" id="loadingRing">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="canvas-fabs" id="canvasFabs">
        <div class="fab" onclick="triggerUpload()" title="Trocar foto">🔄</div>
      </div>
    </div>
  </main>

  <!-- ── SIDE/BOTTOM PANEL ──────────────────────────────────────────────── -->
  <aside class="panel" id="panel">

    <!-- Mobile mode toggle -->
    <div class="mobile-mode-bar">
      <button class="mode-pill active" id="pillHalftone2" onclick="setMode('halftone')">Revelado</button>
      <button class="mode-pill" id="pillTemplate2" onclick="setMode('template')">Para Pintar</button>
    </div>

    <!-- Sliders -->
    <div class="panel-section">
      <div class="panel-label">Ajustes</div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-item active" id="tab-rings"     onclick="switchTab('rings')">Voltas</button>
        <button class="tab-item"        id="tab-thickness" onclick="switchTab('thickness')">Espessura</button>
        <button class="tab-item"        id="tab-contrast"  onclick="switchTab('contrast')">Contraste</button>
        <button class="tab-item"        id="tab-organic"   onclick="switchTab('organic')">Orgânico</button>
      </div>

      <!-- Each slider -->
      <div id="ctrl-rings"     class="slider-wrap">
        <div class="slider-labels"><span>Poucas</span><span>Muitas</span></div>
        <div class="track" id="trk-rings"><div class="track-bg"><div class="track-fill" id="fill-rings" style="width:50%"></div></div><div class="track-thumb" id="thumb-rings" style="left:50%"></div></div>
        <div class="dots" id="dots-rings"></div>
      </div>
      <div id="ctrl-thickness" class="slider-wrap" style="display:none">
        <div class="slider-labels"><span>Fino</span><span>Espesso</span></div>
        <div class="track" id="trk-thickness"><div class="track-bg"><div class="track-fill" id="fill-thickness" style="width:50%"></div></div><div class="track-thumb" id="thumb-thickness" style="left:50%"></div></div>
        <div class="dots" id="dots-thickness"></div>
      </div>
      <div id="ctrl-contrast"  class="slider-wrap" style="display:none">
        <div class="slider-labels"><span>Suave</span><span>Intenso</span></div>
        <div class="track" id="trk-contrast"><div class="track-bg"><div class="track-fill" id="fill-contrast" style="width:45%"></div></div><div class="track-thumb" id="thumb-contrast" style="left:45%"></div></div>
        <div class="dots" id="dots-contrast"></div>
      </div>
      <div id="ctrl-organic"   class="slider-wrap" style="display:none">
        <div class="slider-labels"><span>Geométrico</span><span>À mão</span></div>
        <div class="track" id="trk-organic"><div class="track-bg"><div class="track-fill" id="fill-organic" style="width:20%"></div></div><div class="track-thumb" id="thumb-organic" style="left:20%"></div></div>
        <div class="dots" id="dots-organic"></div>
      </div>

      <button class="gen-btn" onclick="generate()">✦ Gerar Espiral</button>
    </div>

    <div class="panel-divider"></div>

    <!-- Colors -->
    <div class="panel-section" style="padding-bottom:1.1rem">
      <div class="panel-label">Cor das linhas</div>
      <div class="color-grid" id="colorGrid">
        <!-- swatches injected by JS -->
      </div>
    </div>

  </aside>
</div>

<!-- ── CROP SCREEN ──────────────────────────────────────────────────────── -->
<div id="cropScreen" style="display:none;position:fixed;inset:0;z-index:50;background:#000;flex-direction:column">
  <div style="position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:max(1rem,var(--safe-t)) 1.25rem 1rem;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent)">
    <span style="font-size:0.75rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em">Posicione a imagem</span>
    <div style="display:flex;gap:0.5rem">
      <button onclick="cancelCrop()" style="padding:0.45rem 1rem;border-radius:99px;border:none;background:rgba(255,255,255,0.15);color:white;font-family:inherit;font-size:0.8rem;cursor:pointer">Cancelar</button>
      <button onclick="confirmCrop()" style="padding:0.45rem 1rem;border-radius:99px;border:none;background:var(--accent);color:var(--accent-fg);font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer">Usar ✓</button>
    </div>
  </div>
  <div id="cropViewport" style="flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center">
    <canvas id="cropCanvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
    <div id="cropCircleEl" style="position:absolute;border-radius:50%;border:2px solid var(--accent);pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)"></div>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:1.5rem 2rem calc(2rem + var(--safe-b));background:linear-gradient(to top,rgba(0,0,0,0.75),transparent)">
    <div id="zoomTrack" style="position:relative;height:36px;display:flex;align-items:center;cursor:pointer">
      <div style="width:100%;height:4px;border-radius:99px;background:rgba(255,255,255,0.2)">
        <div id="zoomFill" style="height:100%;border-radius:99px;background:var(--accent);width:20%"></div>
      </div>
      <div id="zoomThumb" style="position:absolute;top:50%;left:20%;width:22px;height:22px;border-radius:50%;background:white;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,0.4);pointer-events:none"></div>
    </div>
    <p style="text-align:center;margin-top:0.6rem;font-size:0.68rem;color:rgba(255,255,255,0.35);letter-spacing:0.05em">Arraste para reposicionar · Aperte para ampliar</p>
  </div>
</div>

<!-- ── EXPORT SHEET ──────────────────────────────────────────────────────── -->
<div class="sheet-bg" id="sheetBg" onclick="hideSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Salvar arte</div>
    <button class="export-opt" onclick="doExport('png')">
      <div class="export-icon" style="background:#e8f5ee">🖼</div>
      <div><div class="export-label">PNG</div><div class="export-sub">Alta resolução · para compartilhar</div></div>
    </button>
    <button class="export-opt" onclick="doExport('svg')">
      <div class="export-icon" style="background:#eef0fd">✦</div>
      <div><div class="export-label">SVG Vetorial</div><div class="export-sub">Qualidade infinita · corte a laser</div></div>
    </button>
    <button class="export-opt" onclick="doExport('pdf')">
      <div class="export-icon" style="background:#fdecea">📄</div>
      <div><div class="export-label">PDF A4</div><div class="export-sub">Centralizado · pronto para imprimir</div></div>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
<canvas id="imgCanvas"></canvas>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const S = {
  mode: 'halftone',
  rings: 0.50, thickness: 0.50, contrast: 0.45, organic: 0.20,
  color: '#111111',
  hasImage: false,
  croppedBitmap: null,
  spiralPaths: [],
  srcImg: null,
}
let liveTimer = null
let cropVW = 0, cropVH = 0, cropCircleSize = 0
let cropX = 0, cropY = 0, cropScale = 1, cropMinScale = 1
let dragStart = null, pinchDist0 = null, cropScale0 = 1

// ── THEME ──────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem('spiral-theme') || 'light'
document.documentElement.setAttribute('data-theme', savedTheme)
updateThemeBtn(savedTheme)

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme')
  const next = current === 'dark' ? 'light' : 'dark'
  document.documentElement.setAttribute('data-theme', next)
  localStorage.setItem('spiral-theme', next)
  updateThemeBtn(next)
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('themeBtn')
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '☾'
}

// ── CANVAS SIZE ────────────────────────────────────────────────────────────
function resizeCanvas() {
  const area = document.getElementById('canvasArea')
  const isMobile = window.innerWidth <= 680
  const pad = isMobile ? 24 : 48
  const maxW = area.offsetWidth - pad
  const maxH = area.offsetHeight - pad
  const size = Math.min(maxW, maxH, 600)
  const ring = document.getElementById('canvasRing')
  ring.style.width = size + 'px'
  ring.style.height = size + 'px'
  const c = document.getElementById('spiralCanvas')
  c.style.width = size + 'px'
  c.style.height = size + 'px'
}
window.addEventListener('resize', resizeCanvas)
resizeCanvas()

// ── DOTS ───────────────────────────────────────────────────────────────────
;['rings','thickness','contrast','organic'].forEach(id => {
  const el = document.getElementById('dots-' + id)
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div')
    d.className = 'dot'
    el.appendChild(d)
  }
})
function updateDots(id, val) {
  const dots = document.getElementById('dots-' + id).children
  const n = Math.round(val * (dots.length - 1))
  for (let i = 0; i < dots.length; i++) dots[i].classList.toggle('on', i <= n)
}
function setSliderVis(key, val) {
  const p = (val * 100).toFixed(1) + '%'
  document.getElementById('fill-' + key).style.width = p
  document.getElementById('thumb-' + key).style.left = p
  updateDots(key, val)
}
;['rings','thickness','contrast','organic'].forEach(key => setSliderVis(key, S[key]))

// ── SLIDERS ────────────────────────────────────────────────────────────────
;['rings','thickness','contrast','organic'].forEach(key => {
  const trk = document.getElementById('trk-' + key)
  let down = false
  const update = x => {
    const r = trk.getBoundingClientRect()
    const v = Math.max(0, Math.min(1, (x - r.left) / r.width))
    S[key] = v; setSliderVis(key, v)
    if (key === 'contrast') sampleCtx = null
    scheduleLive()
  }
  trk.addEventListener('mousedown', e => { down = true; update(e.clientX) })
  window.addEventListener('mousemove', e => { if (down) update(e.clientX) })
  window.addEventListener('mouseup', () => { down = false })
  trk.addEventListener('touchstart', e => { down = true; update(e.touches[0].clientX) }, { passive: true })
  trk.addEventListener('touchmove', e => { if (down) update(e.touches[0].clientX) }, { passive: true })
  trk.addEventListener('touchend', () => { down = false })
})

// ── TABS ───────────────────────────────────────────────────────────────────
const TABS = ['rings','thickness','contrast','organic']
function switchTab(id) {
  TABS.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === id)
    document.getElementById('ctrl-' + t).style.display = t === id ? '' : 'none'
  })
}

// ── MODE ───────────────────────────────────────────────────────────────────
function setMode(m) {
  S.mode = m
  ;['pillHalftone','pillHalftone2'].forEach(id => {
    const el = document.getElementById(id)
    if (el) el.classList.toggle('active', m === 'halftone')
  })
  ;['pillTemplate','pillTemplate2'].forEach(id => {
    const el = document.getElementById(id)
    if (el) el.classList.toggle('active', m === 'template')
  })
  if (S.hasImage) scheduleLive()
}

// ── COLORS ─────────────────────────────────────────────────────────────────
const COLORS = [
  '#111111','#1a3a8f','#8a1a6e','#c0390a','#2e7d32','#8B6914',
  '#4a4a4a','#0077b6','#d62828','#f4a261','#2d6a4f','#7b2d8b',
]
const grid = document.getElementById('colorGrid')
COLORS.forEach(c => {
  const sw = document.createElement('div')
  sw.className = 'color-swatch' + (c === S.color ? ' active' : '')
  sw.style.background = c
  sw.onclick = () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'))
    sw.classList.add('active')
    S.color = c
    if (S.hasImage) scheduleLive()
  }
  grid.appendChild(sw)
})
// Custom color
const custom = document.createElement('div')
custom.className = 'color-custom'
custom.title = 'Cor personalizada'
custom.innerHTML = '<input type="color" value="#111111"><span>+</span>'
custom.querySelector('input').oninput = e => {
  S.color = e.target.value
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'))
  custom.style.background = S.color
  if (S.hasImage) scheduleLive()
}
grid.appendChild(custom)

// ── UPLOAD ──────────────────────────────────────────────────────────────────
function triggerUpload() { document.getElementById('fileInput').click() }
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return
  e.target.value = ''
  const reader = new FileReader()
  reader.onload = ev => {
    const img = new Image()
    img.onload = () => { S.srcImg = img; openCrop() }
    img.src = ev.target.result
  }
  reader.readAsDataURL(file)
}

// ── CROP ────────────────────────────────────────────────────────────────────
function openCrop() {
  const screen = document.getElementById('cropScreen')
  screen.style.display = 'flex'
  const vp = document.getElementById('cropViewport')
  cropVW = vp.offsetWidth; cropVH = vp.offsetHeight
  cropCircleSize = Math.min(cropVW, cropVH) * 0.82
  const circ = document.getElementById('cropCircleEl')
  circ.style.width = cropCircleSize + 'px'
  circ.style.height = cropCircleSize + 'px'
  const img = S.srcImg
  const asp = img.naturalWidth / img.naturalHeight
  cropMinScale = asp > 1 ? cropCircleSize / img.naturalHeight : cropCircleSize / img.naturalWidth
  cropScale = cropMinScale * 1.1
  cropX = (cropVW - img.naturalWidth * cropScale) / 2
  cropY = (cropVH - img.naturalHeight * cropScale) / 2
  const c = document.getElementById('cropCanvas')
  c.width = cropVW; c.height = cropVH
  syncZoomSlider(); clampCrop(); drawCrop()
  setupCropTouch()
  setupZoom()
}
function drawCrop() {
  const c = document.getElementById('cropCanvas')
  const ctx = c.getContext('2d')
  ctx.clearRect(0, 0, cropVW, cropVH)
  ctx.fillStyle = '#000'
  ctx.fillRect(0, 0, cropVW, cropVH)
  ctx.drawImage(S.srcImg, cropX, cropY, S.srcImg.naturalWidth * cropScale, S.srcImg.naturalHeight * cropScale)
}
function clampCrop() {
  const w = S.srcImg.naturalWidth * cropScale
  const h = S.srcImg.naturalHeight * cropScale
  const cx = cropVW / 2, cy = cropVH / 2, r = cropCircleSize / 2
  cropX = Math.min(cx - r, Math.max(cx + r - w, cropX))
  cropY = Math.min(cy - r, Math.max(cy + r - h, cropY))
}
function syncZoomSlider() {
  const t = Math.max(0, Math.min(1, (cropScale / cropMinScale - 1) / 2.5))
  const p = (t * 100).toFixed(0) + '%'
  document.getElementById('zoomFill').style.width = p
  document.getElementById('zoomThumb').style.left = p
}
function setupCropTouch() {
  const vp = document.getElementById('cropViewport')
  vp.ontouchstart = e => {
    if (e.touches.length === 1) {
      dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: cropX, oy: cropY }
    } else if (e.touches.length === 2) {
      pinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY)
      cropScale0 = cropScale; dragStart = null
    }
  }
  vp.ontouchmove = e => {
    e.preventDefault()
    if (e.touches.length === 1 && dragStart) {
      cropX = dragStart.ox + e.touches[0].clientX - dragStart.x
      cropY = dragStart.oy + e.touches[0].clientY - dragStart.y
      clampCrop(); drawCrop()
    } else if (e.touches.length === 2 && pinchDist0) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY)
      cropScale = Math.max(cropMinScale, cropScale0 * d / pinchDist0)
      syncZoomSlider(); clampCrop(); drawCrop()
    }
  }
  vp.ontouchend = e => { if (e.touches.length < 2) pinchDist0 = null; if (!e.touches.length) dragStart = null }
}
function setupZoom() {
  const trk = document.getElementById('zoomTrack')
  let down = false
  const apply = x => {
    const r = trk.getBoundingClientRect()
    const t = Math.max(0, Math.min(1, (x - r.left) / r.width))
    cropScale = Math.max(cropMinScale, cropMinScale * (1 + t * 2.5))
    syncZoomSlider(); clampCrop(); drawCrop()
  }
  trk.addEventListener('mousedown', e => { down = true; apply(e.clientX) })
  window.addEventListener('mousemove', e => { if (down) apply(e.clientX) })
  window.addEventListener('mouseup', () => { down = false })
  trk.addEventListener('touchstart', e => { apply(e.touches[0].clientX) }, { passive: true })
  trk.addEventListener('touchmove', e => { apply(e.touches[0].clientX) }, { passive: true })
}
function cancelCrop() { document.getElementById('cropScreen').style.display = 'none' }
function confirmCrop() {
  const size = 512
  const off = document.createElement('canvas')
  off.width = off.height = size
  const ctx = off.getContext('2d')
  const cx = cropVW / 2, cy = cropVH / 2, r = cropCircleSize / 2
  ctx.drawImage(S.srcImg, (cx - r - cropX) / cropScale, (cy - r - cropY) / cropScale, cropCircleSize / cropScale, cropCircleSize / cropScale, 0, 0, size, size)
  S.croppedBitmap = off
  S.hasImage = true
  document.getElementById('cropScreen').style.display = 'none'
  document.getElementById('emptyState').style.display = 'none'
  document.getElementById('canvasFabs').classList.add('show')
  document.getElementById('saveBtn').style.display = 'flex'
  sampleCtx = null
  generate()
}

// ── SAMPLING ───────────────────────────────────────────────────────────────
let sampleCtx = null, sampleContrast = -1
function getBrightness(nx, ny) {
  const SZ = 512, cval = 0.5 + S.contrast * 3.5
  if (!sampleCtx || sampleContrast !== cval) {
    const c = document.getElementById('imgCanvas')
    c.width = c.height = SZ
    const ctx = c.getContext('2d')
    ctx.filter = `grayscale(1) contrast(${cval})`
    ctx.drawImage(S.croppedBitmap, 0, 0, SZ, SZ)
    sampleCtx = ctx; sampleContrast = cval
  }
  const px = Math.max(0, Math.min(511, Math.round((nx + 1) / 2 * 511)))
  const py = Math.max(0, Math.min(511, Math.round((ny + 1) / 2 * 511)))
  return sampleCtx.getImageData(px, py, 1, 1).data[0] / 255
}

// ── GENERATE ──────────────────────────────────────────────────────────────
function scheduleLive() {
  if (!S.hasImage) return
  clearTimeout(liveTimer)
  liveTimer = setTimeout(() => _generate(), 160)
}

function generate() {
  if (!S.hasImage) { toast('Adicione uma foto primeiro'); return }
  document.getElementById('loadingRing').classList.add('show')
  requestAnimationFrame(() => requestAnimationFrame(() => {
    _generate()
    document.getElementById('loadingRing').classList.remove('show')
  }))
}

function _generate() {
  sampleCtx = null
  const canvas = document.getElementById('spiralCanvas')
  const OUT = 1200; canvas.width = canvas.height = OUT
  const ctx = canvas.getContext('2d')
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, OUT, OUT)
  const cx = OUT / 2, cy = OUT / 2, maxR = OUT * 0.48
  const turns = Math.round(25 + S.rings * 65)
  const spacing = maxR / turns
  const paintZone = spacing * (1 - 0.28)
  const maxLw = Math.max(0.5, paintZone * (0.1 + S.thickness * 0.8))
  const minLw = Math.max(0.3, maxLw * 0.07)
  const intensity = 0.4 + S.contrast * 3.2
  const jitter = S.organic * 0.8
  const totalAngle = turns * 2 * Math.PI
  const steps = turns * 360
  const s = [Math.random()*1e3, Math.random()*1e3, Math.random()*1e3, Math.random()*1e3]
  const noise = t => Math.sin(t*23.7+s[0])*.5+Math.sin(t*7.3+s[1])*.3+Math.sin(t*41.1+s[2])*.13+Math.sin(t*3.1+s[3])*.07
  const pts = []
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, ang = t * totalAngle, r = t * maxR
    const x = cx + r * Math.cos(ang), y = cy + r * Math.sin(ang)
    const nx = (x - cx) / maxR, ny = (y - cy) / maxR
    let b = S.hasImage ? getBrightness(nx, ny) : Math.sqrt(nx*nx+ny*ny)
    b = Math.pow(Math.max(0, Math.min(1, b)), 1 / intensity)
    const base = minLw + (1 - b) * (maxLw - minLw)
    pts.push({ x, y, lw: Math.max(0.3, base + jitter * base * 0.4 * noise(t)) })
  }
  S.spiralPaths = []
  if (S.mode === 'halftone') {
    for (let i = 1; i < pts.length; i++) {
      const p0 = pts[i-1], p1 = pts[i], lw = (p0.lw+p1.lw)/2
      ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y)
      ctx.lineWidth = lw; ctx.strokeStyle = S.color; ctx.lineCap = 'round'; ctx.stroke()
      S.spiralPaths.push({ mode:'solid', x1:p0.x,y1:p0.y,x2:p1.x,y2:p1.y,lw })
    }
  } else {
    const EDGE = Math.max(0.5, OUT/2500)
    const norms = pts.map((p,i) => {
      const prev=pts[Math.max(0,i-1)], next=pts[Math.min(pts.length-1,i+1)]
      const dx=next.x-prev.x, dy=next.y-prev.y, len=Math.sqrt(dx*dx+dy*dy)||1
      return { nx:-dy/len, ny:dx/len }
    })
    const outer = pts.map((p,i)=>({x:p.x+norms[i].nx*(p.lw/2), y:p.y+norms[i].ny*(p.lw/2)}))
    const inner = pts.map((p,i)=>({x:p.x-norms[i].nx*(p.lw/2), y:p.y-norms[i].ny*(p.lw/2)}))
    const last = pts.length-1
    ctx.beginPath(); ctx.moveTo(outer[0].x,outer[0].y)
    for(let i=1;i<=last;i++) ctx.lineTo(outer[i].x,outer[i].y)
    ctx.lineTo(inner[last].x,inner[last].y)
    for(let i=last-1;i>=0;i--) ctx.lineTo(inner[i].x,inner[i].y)
    ctx.closePath(); ctx.fillStyle='white'; ctx.lineWidth=EDGE; ctx.strokeStyle=S.color; ctx.lineJoin='round'; ctx.fill(); ctx.stroke()
    for(let i=1;i<pts.length;i++){
      const p0=pts[i-1],p1=pts[i],n0=norms[i-1],n1=norms[i],h0=p0.lw/2,h1=p1.lw/2
      S.spiralPaths.push({mode:'template',ox1:p0.x+n0.nx*h0,oy1:p0.y+n0.ny*h0,ox2:p1.x+n1.nx*h1,oy2:p1.y+n1.ny*h1,ix1:p0.x-n0.nx*h0,iy1:p0.y-n0.ny*h0,ix2:p1.x-n1.nx*h1,iy2:p1.y-n1.ny*h1,edgeW:EDGE})
    }
  }
}

// ── EXPORT SHEET ───────────────────────────────────────────────────────────
function showSheet() { document.getElementById('sheetBg').classList.add('show') }
function hideSheet(e) { if (e.target===document.getElementById('sheetBg')) document.getElementById('sheetBg').classList.remove('show') }

function doExport(type) {
  document.getElementById('sheetBg').classList.remove('show')
  const canvas = document.getElementById('spiralCanvas')
  if (type === 'png') {
    const a = document.createElement('a'); a.download='spiral-art.png'; a.href=canvas.toDataURL('image/png'); a.click()
    toast('PNG salvo!')
  } else if (type === 'svg') {
    const c = S.color, paths = S.spiralPaths, sz = 1200
    let svg = `<?xml version="1.0"?><svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><rect width="${sz}" height="${sz}" fill="white"/>`
    if (paths[0]?.mode==='solid') {
      for(const p of paths) svg+=`<line x1="${p.x1.toFixed(1)}" y1="${p.y1.toFixed(1)}" x2="${p.x2.toFixed(1)}" y2="${p.y2.toFixed(1)}" stroke="${c}" stroke-width="${p.lw.toFixed(2)}" stroke-linecap="round"/>`
    } else {
      const ew=paths[0].edgeW.toFixed(2)
      let od=`M ${paths[0].ox1.toFixed(1)} ${paths[0].oy1.toFixed(1)}`, id2=`M ${paths[0].ix1.toFixed(1)} ${paths[0].iy1.toFixed(1)}`
      for(const p of paths){od+=` L ${p.ox2.toFixed(1)} ${p.oy2.toFixed(1)}`;id2+=` L ${p.ix2.toFixed(1)} ${p.iy2.toFixed(1)}`}
      const l=paths[paths.length-1]
      svg+=`<path d="${od}" fill="none" stroke="${c}" stroke-width="${ew}" stroke-linecap="round" stroke-linejoin="round"/>`
      svg+=`<path d="${id2}" fill="none" stroke="${c}" stroke-width="${ew}" stroke-linecap="round" stroke-linejoin="round"/>`
      svg+=`<line x1="${l.ox2.toFixed(1)}" y1="${l.oy2.toFixed(1)}" x2="${l.ix2.toFixed(1)}" y2="${l.iy2.toFixed(1)}" stroke="${c}" stroke-width="${ew}" stroke-linecap="round"/>`
      svg+=`<line x1="${paths[0].ox1.toFixed(1)}" y1="${paths[0].oy1.toFixed(1)}" x2="${paths[0].ix1.toFixed(1)}" y2="${paths[0].iy1.toFixed(1)}" stroke="${c}" stroke-width="${ew}" stroke-linecap="round"/>`
    }
    svg+='</svg>'
    const blob=new Blob([svg],{type:'image/svg+xml'}), url=URL.createObjectURL(blob), a=document.createElement('a')
    a.download='spiral-art.svg';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)
    toast('SVG salvo!')
  } else if (type === 'pdf') {
    const PW=595.28,PH=841.89,M=28,side=Math.min(PW-M*2,PH-M*2)
    const ix=((PW-side)/2).toFixed(2),iy=((PH-side)/2).toFixed(2)
    const b64=canvas.toDataURL('image/jpeg',0.95).split(',')[1]
    const bin=atob(b64), bytes=new Uint8Array(bin.length)
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i)
    const enc=s=>new TextEncoder().encode(s)
    const parts=[],offs=[]
    const push=s=>parts.push(enc(s)), pushB=b=>parts.push(b)
    const tlen=()=>parts.reduce((a,p)=>a+p.length,0)
    push('%PDF-1.4\n%\xFF\xFF\xFF\xFF\n')
    offs.push(tlen());push('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n')
    offs.push(tlen());push('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n')
    offs.push(tlen());push(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PW.toFixed(2)} ${PH.toFixed(2)}] /Contents 4 0 R /Resources << /XObject << /Im0 5 0 R >> >> >>\nendobj\n`)
    const sc=`q\n${side.toFixed(2)} 0 0 ${side.toFixed(2)} ${ix} ${iy} cm\n/Im0 Do\nQ\n`
    offs.push(tlen());push(`4 0 obj\n<< /Length ${sc.length} >>\nstream\n${sc}endstream\nendobj\n`)
    offs.push(tlen());push(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${canvas.width} /Height ${canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${bytes.length} >>\nstream\n`)
    pushB(bytes);push('\nendstream\nendobj\n')
    const xp=tlen();let xref=`xref\n0 6\n0000000000 65535 f \n`
    for(const o of offs) xref+=String(o).padStart(10,'0')+' 00000 n \n'
    push(xref);push(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xp}\n%%EOF\n`)
    const tot=parts.reduce((a,p)=>a+p.length,0),out=new Uint8Array(tot);let pos=0
    for(const p of parts){out.set(p,pos);pos+=p.length}
    const blob=new Blob([out],{type:'application/pdf'}),url=URL.createObjectURL(blob),a=document.createElement('a')
    a.download='spiral-art.pdf';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)
    toast('PDF salvo!')
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const t=document.getElementById('toast')
  t.textContent=msg; t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),2200)
}
</script>
